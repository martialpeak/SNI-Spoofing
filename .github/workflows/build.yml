name: Build Python Proxy and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pydivert

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --windowed --uac-admin --collect-data pydivert --hidden-import network_tools --hidden-import packet_templates --hidden-import fake_tcp --hidden-import injecter --hidden-import monitor_connection main.py

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v1
        with:
          files: dist/main.exe
          name: Proxy Release ${{ github.ref_name }}
          body: |
            نسخه جدید به همراه رابط کاربری گرافیکی (GUI).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
