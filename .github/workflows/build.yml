name: Build Python Proxy

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: python -m pip install --upgrade pip && pip install pyinstaller pydivert customtkinter

      - name: Build EXE
        run: pyinstaller --onefile --windowed --uac-admin --collect-data pydivert --collect-all customtkinter main.py

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/main.exe
          name: Proxy Release ${{ github.ref_name }}
          body: "نسخه مدرن پروکسی آماده استفاده است."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
